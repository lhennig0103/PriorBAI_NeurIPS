PY_EXPERIMENTER:
  n_jobs: 1

  Database:
    provider: mysql
    database: priorbai_neurips

    table:
      name: new_stopping_priorband_no_es

      keyfields:
        run_id: { type: VARCHAR(64), values: ["__AUTO__"] }
        optimizer: { type: VARCHAR(64), values: ["priorband"] }
        num_arms: { type: INT, values: [256] }
        benchmark: { type: VARCHAR(255), values: ["lcbench"] }
        kernel: { type: VARCHAR(255), values: ["linear"] }
        use_predicted_y: { type: INT, values: [0] }
        use_early_stopping: { type: INT, values: [0] }
        seed: { type: INT, values: { start: 0, stop: 20 } }
        dataset_id: { type: INT, values: { start: 0, stop: 34 } }
        prior_kind: { type: VARCHAR(255), values: ["uniform"] }
        performance_prior_std: { type: DOUBLE, values: [0.01] }
        sigma0: { type: DOUBLE, values: [0.01] }
        epsilon: { type: DOUBLE, values: [0.01] }
        delta: { type: DOUBLE, values: [0.01] }

      resultfields:
        T_max: INT
        consumed_budget: DOUBLE
        remaining_arms: INT
        num_epsilon_optimal_arms: INT
        regret: DOUBLE
        epsilon_optimal: INT

    logtables:
      sh_iterations:
          bracket: INT
          iteration: INT
          fidelity: INT
          num_arms: VARCHAR(20)
          best_arm_included: INT
          budget_spent_so_far: DOUBLE
          N_stop: DOUBLE
          std_arm_performances: DOUBLE
          arm_prediction_variances: TEXT
          early_stopping_enabled: INT
          budget_criterion_met: INT
          gp_criterion_met: INT
          was_terminated: INT
      brackets:
          bracket: INT
          n_arms: INT
          budget_used: DOUBLE
          stopped_early: INT
          stopped_after_round: INT
